<header class="bg-white border-b border-gray-200 sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <!-- Logo -->
      <a href="/" class="flex items-center gap-2 font-bold text-xl text-primary">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
        </svg>
        ZnajdźSalon<span class="text-accent">.pl</span>
      </a>

      <!-- Desktop nav -->
      <nav class="hidden md:flex items-center gap-6">
        {{ range .Site.Menus.main }}
          <a href="{{ .URL }}" class="text-text-muted hover:text-primary transition-colors font-medium">
            {{ .Name }}
          </a>
        {{ end }}
      </nav>

      <!-- Mobile menu button -->
      <button x-data x-on:click="$dispatch('toggle-menu')"
        class="md:hidden p-2 rounded-lg hover:bg-gray-100">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Mobile menu -->
  <div x-data="{ open: false }" x-on:toggle-menu.window="open = !open" x-show="open" x-cloak
    class="md:hidden border-t border-gray-200 bg-white">
    <nav class="px-4 py-3 space-y-2">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL }}" class="block px-3 py-2 rounded-lg hover:bg-gray-100 font-medium">
          {{ .Name }}
        </a>
      {{ end }}
    </nav>
  </div>
</header>
