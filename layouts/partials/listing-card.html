{{/* Expects a listing data dict as context (.) */}}
<article class="bg-white rounded-xl border border-gray-200 hover:border-primary-light hover:shadow-md transition-all p-5">
  <div class="flex items-start justify-between gap-3">
    <div class="flex-1 min-w-0">
      <h3 class="font-bold text-lg truncate">
        <a href="/salon/{{ .slug }}/" class="hover:text-primary transition-colors">
          {{ .name }}
        </a>
      </h3>
      <p class="text-text-muted text-sm mt-1">{{ .full_address }}</p>
    </div>
    {{ if .rating }}
    <div class="flex-shrink-0 flex items-center gap-1 bg-star/10 text-star px-2.5 py-1 rounded-lg text-sm font-bold">
      <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
      {{ .rating }}
    </div>
    {{ end }}
  </div>

  {{ if .brands }}
  <div class="flex flex-wrap gap-1.5 mt-3">
    {{ range .brands }}
      <span class="inline-block bg-primary/5 text-primary text-xs font-medium px-2 py-0.5 rounded-full">{{ . }}</span>
    {{ end }}
  </div>
  {{ end }}

  <div class="flex items-center gap-4 mt-3 text-sm text-text-muted">
    {{ if .phone }}
    <span class="flex items-center gap-1">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
      </svg>
      {{ .phone }}
    </span>
    {{ end }}
    {{ if .reviews_count }}
    <span class="flex items-center gap-1">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
      </svg>
      {{ .reviews_count }} opinii
    </span>
    {{ end }}
  </div>
</article>
