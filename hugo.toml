baseURL = "https://znajdzsalon.pl"
languageCode = "pl"
defaultContentLanguage = "pl"
title = "ZnajdźSalon.pl — Salony samochodowe w Polsce"

[params]
  description = "Katalog salonów samochodowych w Polsce. Znajdź autoryzowanego dealera każdej marki w swoim mieście."
  ogImage = "/images/og-default.jpg"

[permalinks]
  salony = "/salon/:slug/"
  miasta = "/miasta/:slug/"
  wojewodztwa = "/wojewodztwa/:slug/"

[outputs]
  home = ["HTML", "JSON"]

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[menu]
  [[menu.main]]
    name = "Znajdź salon"
    url = "/szukaj/"
    weight = 1
    [menu.main.params]
      icon = "search"
  [[menu.main]]
    name = "Województwa"
    url = "/wojewodztwa/"
    weight = 2
    [menu.main.params]
      icon = "map"
  [[menu.main]]
    name = "Najlepsze salony"
    url = "/najlepsze/"
    weight = 3
    [menu.main.params]
      icon = "star"
  [[menu.main]]
    name = "Blog"
    url = "/blog/"
    weight = 4
    [menu.main.params]
      icon = "blog"
  [[menu.main]]
    name = "Kontakt"
    url = "/kontakt/"
    weight = 5
    [menu.main.params]
      icon = "contact"
